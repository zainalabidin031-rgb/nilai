<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Ujian Online</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #2ecc71;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .cbt-container { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .main-box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .sidebar { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); height: fit-content; }
        .header-cbt { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .timer { font-size: 20px; font-weight: bold; color: #e74c3c; background: #fde8e7; padding: 5px 15px; border-radius: 5px; }
        .question { font-size: 18px; font-weight: 600; margin-bottom: 15px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { padding: 12px; border: 1px solid #ccc; border-radius: 5px; background: #fafafa; text-align: left; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .option-btn:hover { background: #f0f0f0; }
        .option-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-nav { background: var(--primary); color: white; }
        .btn-submit { background: var(--success); color: white; }
        .grid-numbers { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }
        .num-btn { padding: 10px; border: 1px solid #ccc; background: #f8f9fa; border-radius: 4px; cursor: pointer; text-align: center; font-weight: bold; }
        .num-btn.answered { background: var(--primary); color: white; }
        .num-btn.active { border: 2px solid var(--accent); box-shadow: 0 0 5px rgba(52,152,219,0.5); }
        .hidden { display: none; }
        .result-box { text-align: center; padding: 40px; background: white; border-radius: 8px; max-width: 500px; margin: 50px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input[type="text"] { width: 100%; padding: 10px; margin-top: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="login-page" class="result-box">
    <h2>Formulir Ujian CBT</h2>
    <p>Silakan masukkan nama lengkap Anda untuk memulai ujian.</p>
    <input type="text" id="student-name" placeholder="Nama Lengkap Siswa" required>
    <button class="btn btn-submit" style="width: 100%;" onclick="startExam()">Mulai Ujian</button>
</div>

<div id="cbt-page" class="cbt-container hidden">
    <div class="main-box">
        <div class="header-cbt">
            <span id="question-title" style="font-weight: bold; color: var(--primary);">Soal Nomor 1</span>
            <div class="timer">Sisa Waktu: <span id="time-display">30:00</span></div>
        </div>
        
        <div id="quiz-area">
            <div class="question" id="question-text">Memuat soal...</div>
            <div class="options" id="options-container"></div>
        </div>

        <div class="nav-buttons">
            <button class="btn btn-nav" id="prev-btn" onclick="changeQuestion(-1)">Sebelumnya</button>
            <button class="btn btn-nav" id="next-btn" onclick="changeQuestion(1)">Selanjutnya</button>
            <button class="btn btn-submit hidden" id="submit-btn" onclick="finishExam()">Selesai Ujian</button>
        </div>
    </div>

    <div class="sidebar">
        <h3>Navigasi Soal</h3>
        <p>Klik nomor untuk melompat ke soal:</p>
        <div class="grid-numbers" id="number-nav"></div>
    </div>
</div>

<div id="result-page" class="result-box hidden">
    <h2>Ujian Selesai!</h2>
    <p>Terima kasih telah menyelesaikan ujian.</p>
    <h1 id="score-display" style="color: var(--accent); font-size: 48px; margin: 20px 0;">0</h1>
    <p id="sending-status" style="color: #7f8c8d;">Menyimpan nilai ke sistem...</p>
</div>

<script>
    // --- KONFIGURASI SOAL (25 Soal Bahasa Indonesia & Umum) ---
    const questions = [
        { q: "Ide pokok atau gagasan utama dalam sebuah paragraf biasanya terletak di...", o: ["Awal atau akhir paragraf", "Tengah paragraf", "Seluruh paragraf", "Luar paragraf"], a: 0 },
        { q: "Lawan kata (antonim) dari kata 'Progresif' adalah...", o: ["Aktif", "Regresif", "Maju", "Modern"], a: 1 },
        { q: "Penulisan kata depan yang benar di bawah ini adalah...", o: ["dirumah", "di sekolah", "keatas", "disana"], a: 1 },
        { q: "Kata yang maknanya sama atau hampir sama disebut dengan...", o: ["Antonim", "Sinonim", "Homonim", "Akronim"], a: 1 },
        { q: "Manakah di bawah ini yang merupakan kalimat efektif?", o: ["Bagi para siswa-siswa diharapkan berkumpul.", "Siswa diharapkan berkumpul.", "Untuk semua siswa-siswa sekalian silakan berkumpul.", "Para siswa-siswa semua silakan berkumpul."], a: 1 },
        { q: "Kalimat yang memerlukan tanggapan atau jawaban dari orang lain disebut...", o: ["Kalimat perintah", "Kalimat berita", "Kalimat tanya", "Kalimat seru"], a: 2 },
        { q: "Buku yang berisi kumpulan peta bumi disebut...", o: ["Kamus", "Ensiklopedia", "Novel", "Atlas"], a: 3 },
        { q: "Cerita rakyat yang mengisahkan asal-usul suatu tempat dinamakan...", o: ["Fabel", "Mitos", "Legenda", "Sage"], a: 2 },
        { q: "Siapakah pencipta lagu kebangsaan 'Indonesia Raya'?", o: ["Ismail Marzuki", "W.R. Supratman", "Kusbini", "C. Simanjuntak"], a: 1 },
        { q: "Rumah adat 'Tongkonan' berasal dari provinsi...", o: ["Sumatera Barat", "Sulawesi Selatan", "Papua", "Kalimantan Timur"], a: 1 },
        { q: "Unsur intrinsik karya sastra yang merupakan pesan moral pembuat cerita disebut...", o: ["Alur", "Latar", "Amanat", "Tema"], a: 2 },
        { q: "Kata 'Apotek' jika ditulis dalam bentuk tidak baku menjadi...", o: ["Apotik", "Apoteker", "Apotis", "Apotex"], a: 0 },
        { q: "Majas yang membandingkan benda mati seolah-olah hidup seperti manusia dinamakan...", o: ["Majas Metafora", "Majas Personifikasi", "Majas Hiperbola", "Majas Aliterasi"], a: 1 },
        { q: "Peribahasa 'Tong kosong nyaring bunyinya' memiliki arti...", o: ["Orang yang pelit biasanya kaya", "Orang yang bodoh biasanya banyak bicara", "Orang yang diam itu bijaksana", "Orang yang suka bernyanyi di kamar mandi"], a: 1 },
        { q: "Penulisan huruf kapital yang benar untuk nama geografi adalah...", o: ["selat Sunda", "Selat sunda", "selat sunda", "Selat Sunda"], a: 3 },
        { q: "Manakah kata di bawah ini yang tergolong kata baku?", o: ["Izin", "Ijin", "Nasehat", "Praktek"], a: 0 },
        { q: "Kalimat yang menggunakan tanda baca koma (,) secara tepat adalah...", o: ["Ibu membeli bayam, aci, dan garam.", "Ibu membeli bayam aci, dan garam.", "Ibu membeli bayam, aci dan garam.", "Ibu, membeli bayam aci dan garam."], a: 0 },
        { q: "Karya sastra yang terikat oleh bait, baris, rima, dan irama disebut...", o: ["Prosa", "Puisi", "Drama", "Novel"], a: 1 },
        { q: "Mata uang resmi yang digunakan oleh negara Jepang adalah...", o: ["Dollar", "Yuan", "Yen", "Won"], a: 2 },
        { q: "Alat pernapasan utama pada hewan lumba-lumba adalah...", o: ["Insang", "Paru-paru", "Kulit", "Trakea"], a: 1 },
        { q: "Lagu daerah 'Apuse' berasal dari daerah...", o: ["Maluku", "Papua", "NTT", "Sulawesi Utara"], a: 1 },
        { q: "Singkatan dari 'POSYANDU' adalah...", o: ["Pos Pelayanan Terpadu", "Pos Pelayanan Pemuda", "Pusat Pelayanan Terpadu", "Pos Pemeriksaan Nyaman Edukasi"], a: 0 },
        { q: "Canti Borobudur yang merupakan candi Buddha terbesar terletak di provinsi...", o: ["Jawa Barat", "Jawa Timur", "Jawa Tengah", "Yogyakarta"], a: 2 },
        { q: "Bahan bakar yang digunakan untuk menggerakkan pesawat terbang adalah...", o: ["Avtur", "Premium", "Solar", "Kerosene"], a: 0 },
        { q: "Negara terluas di dunia berdasarkan total luas wilayahnya adalah...", o: ["Kanada", "Amerika Serikat", "Rusia", "Cina"], a: 2 }
    ];

    // --- GANTI DENGAN LINK WEB APP GOOGLE SCRIPT ANDA ---
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWr1p3PxDKAjnrx6PlgNsL4OO6kRHyb5l6ib3mV1pjeuhRAVeVeVsBmWZP7Rze-8xd/exec"; 

    let currentIdx = 0;
    let answers = new Array(questions.length).fill(null);
    let timeLeft = 1800; // 30 menit dalam detik (30 x 60)
    let timerInterval;
    let studentName = "";

    function startExam() {
        studentName = document.getElementById("student-name").value.trim();
        if(!studentName) return alert("Nama tidak boleh kosong!");
        
        document.getElementById("login-page").classList.add("hidden");
        document.getElementById("cbt-page").classList.remove("hidden");
        
        renderNumbers();
        showQuestion();
        startTimer();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            if(timeLeft <= 0) {
                clearInterval(timerInterval);
                finishExam();
            } else {
                timeLeft--;
                let min = Math.floor(timeLeft / 60);
                let sec = timeLeft % 60;
                document.getElementById("time-display").innerText = `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
            }
        }, 1000);
    }

    function showQuestion() {
        const qData = questions[currentIdx];
        document.getElementById("question-title").innerText = `Soal Nomor ${currentIdx + 1} dari ${questions.length}`;
        document.getElementById("question-text").innerText = qData.q;
        
        const container = document.getElementById("options-container");
        container.innerHTML = "";
        
        qData.o.forEach((opt, index) => {
            const btn = document.createElement("button");
            btn.className = `option-btn ${answers[currentIdx] === index ? 'selected' : ''}`;
            btn.innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
            btn.onclick = () => selectAnswer(index);
            container.appendChild(btn);
        });

        document.getElementById("prev-btn").style.visibility = currentIdx === 0 ? "hidden" : "visible";
        
        if (currentIdx === questions.length - 1) {
            document.getElementById("next-btn").classList.add("hidden");
            document.getElementById("submit-btn").classList.remove("hidden");
        } else {
            document.getElementById("next-btn").classList.remove("hidden");
            document.getElementById("submit-btn").classList.add("hidden");
        }
        
        updateActiveNumber();
    }

    function selectAnswer(index) {
        answers[currentIdx] = index;
        showQuestion();
        renderNumbers();
    }

    function changeQuestion(dir) {
        currentIdx += dir;
        showQuestion();
    }

    function jumpTo(idx) {
        currentIdx = idx;
        showQuestion();
    }

    function renderNumbers() {
        const nav = document.getElementById("number-nav");
        nav.innerHTML = "";
        questions.forEach((_, idx) => {
            const btn = document.createElement("div");
            btn.className = `num-btn ${answers[idx] !== null ? 'answered' : ''}`;
            btn.innerText = idx + 1;
            btn.onclick = () => jumpTo(idx);
            nav.appendChild(btn);
        });
    }

    function updateActiveNumber() {
        const btns = document.getElementById("number-nav").children;
        for(let i=0; i<btns.length; i++) {
            btns[i].classList.remove("active");
        }
        if(btns[currentIdx]) btns[currentIdx].classList.add("active");
    }

    function finishExam() {
        clearInterval(timerInterval);
        if(confirm("Apakah Anda yakin ingin mengakhiri ujian?")) {
            document.getElementById("cbt-page").classList.add("hidden");
            document.getElementById("result-page").classList.remove("hidden");

            // Hitung Nilai
            let correctCount = 0;
            questions.forEach((q, idx) => {
                if(answers[idx] === q.a) correctCount++;
            });
            let finalScore = Math.round((correctCount / questions.length) * 100);
            document.getElementById("score-display").innerText = finalScore;

            // Kirim ke Google Sheets
            sendToGoogleSheets(studentName, finalScore);
        } else {
            startTimer();
        }
    }

    function sendToGoogleSheets(name, score) {
        if(GOOGLE_SCRIPT_URL === "URL_GOOGLE_SCRIPT_ANDA_DI_SINI") {
            document.getElementById("sending-status").innerText = "Sistem penyimpanan belum dihubungkan.";
            return;
        }

        const formData = new FormData();
        formData.append("nama", name);
        formData.append("mapel", "Bahasa Indonesia & Umum");
        formData.append("nilai", score);

        fetch(GOOGLE_SCRIPT_URL, { method: "POST", body: formData })
        .then(res => {
            document.getElementById("sending-status").innerText = "Nilai berhasil direkam secara real-time!";
            document.getElementById("sending-status").style.color = "#2ecc71";
        })
        .catch(err => {
            document.getElementById("sending-status").innerText = "Gagal mengirim nilai otomatis.";
            document.getElementById("sending-status").style.color = "#e74c3c";
        });
    }
</script>
</body>
</html>
